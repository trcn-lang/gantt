<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rétroplanning</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  :root{
    --bleu-france:#000091;
    --bleu-975:#ECECFE;
    --texte:#161616;
    --texte-mention:#666666;
    --bordure:#DDDDDD;
    --fond:#FFFFFF;
    --fond-alt:#F6F6F6;
    --st-planifier:#929292;
    --st-encours:#0063CB;
    --st-attente:#B34000;
    --st-termine:#18753C;
    --st-annule:#CE0500;
    --jour:16px;
    --label-w:300px;
    --row-h:34px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Marianne",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    color:var(--texte);
    background:var(--fond);
    font-size:14px;
  }

  .app{display:flex;flex-direction:column;height:100vh}

  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    gap:16px;padding:12px 16px;border-bottom:1px solid var(--bordure);
    flex-wrap:wrap;
  }
  .topbar h1{
    font-size:18px;font-weight:700;color:var(--bleu-france);
  }
  .meta{font-size:12px;color:var(--texte-mention)}

  .legende{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .legende .item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--texte-mention)}
  .legende .puce{width:12px;height:12px;border-radius:3px;flex:0 0 auto}

  .slider-container{
    padding:8px 16px;
    border-bottom:1px solid var(--bordure);
    display:flex;align-items:center;gap:12px;
  }
  .slider-container input{
    flex:1;
    height:6px;
    cursor:pointer;
  }
  .slider-label{
    font-size:12px;color:var(--texte-mention);min-width:100px;
  }

  .scroll{flex:1;overflow:auto;position:relative}

  .grid-wrapper{
    display:flex;
  }

  .labels-col{
    width:var(--label-w);
    flex-shrink:0;
    border-right:1px solid var(--bordure);
    position:relative;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  .labels-col::after{
    content:'';
    position:absolute;
    right:0;top:0;bottom:0;
    width:4px;
    background:transparent;
    cursor:col-resize;
    z-index:10;
  }

  .labels-col::after:hover{
    background:var(--bleu-france);
  }

  .grid{
    display:grid;
    grid-template-columns:var(--tl-w,600px);
    align-content:start;
    flex:1;
  }

  .corner{
    position:sticky;top:0;left:0;z-index:5;
    background:var(--fond);border-right:1px solid var(--bordure);
    border-bottom:1px solid var(--bordure);
    padding:0 12px;display:flex;align-items:center;flex-direction:column;
    font-size:12px;font-weight:700;color:var(--texte-mention);
    height:56px;
    justify-content:center;
  }

  .head-track{
    position:sticky;top:0;z-index:4;height:56px;
    background:var(--fond);border-bottom:1px solid var(--bordure);
  }
  .head-inner{position:relative;height:100%;}
  .week-label{
    position:absolute;top:0;bottom:0;
    border-left:1px solid var(--bordure);
    padding-left:4px;padding-right:4px;font-size:9px;color:var(--bleu-france);font-weight:700;
    display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;
    white-space:normal;line-height:1.1;padding-top:2px;width:112px;overflow:hidden;
  }

  .label{
    background:var(--fond);
    border-bottom:1px solid var(--fond-alt);
    display:flex;align-items:center;height:var(--row-h);
    padding:0 12px;overflow:hidden;
  }
  .label.section{
    background:var(--bleu-975);color:var(--bleu-france);
    font-weight:700;height:32px;border-bottom:1px solid var(--bordure);
  }
  .label.campagne{
    font-weight:600;color:var(--texte);padding-left:20px;
    background:var(--fond-alt);height:30px;
  }
  .label.tache{padding-left:28px;gap:8px;font-size:13px;}
  .label.tache .nom{
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;
  }
  .label.tache .resp{
    font-size:11px;color:var(--texte-mention);flex:0 0 auto;
  }

  .track{
    position:relative;height:var(--row-h);
    border-bottom:1px solid var(--fond-alt);
    background-image:repeating-linear-gradient(
      to right,
      var(--fond-alt) 0 1px,
      transparent 1px calc(7 * var(--jour))
    );
  }
  .track.section{height:32px;background:var(--bleu-975);border-bottom:1px solid var(--bordure)}
  .track.campagne{height:30px;background:var(--fond-alt)}

  .track.tache::before{
    content:"";position:absolute;top:0;bottom:0;
    left:calc(var(--today) * var(--jour));
    width:2px;background:#6A6AF4;opacity:.55;z-index:0;
  }
  .track.tache.no-today::before{display:none}

  .barre{
    position:absolute;top:6px;height:calc(var(--row-h) - 12px);
    border-radius:4px;z-index:1;
    display:flex;align-items:center;padding:0 6px;
    font-size:11px;color:#fff;white-space:nowrap;overflow:hidden;
    cursor:default;
  }
  .barre.st-annule{opacity:.55;text-decoration:line-through}

  .pill-plan{
    position:absolute;top:8px;left:6px;z-index:1;
    font-size:10px;color:var(--texte-mention);
    background:#EEE;border:1px solid var(--bordure);
    border-radius:10px;padding:1px 8px;
  }

  .empty{padding:40px;text-align:center;color:var(--texte-mention)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>Rétroplanning</h1>
    <div style="display:flex;gap:20px;align-items:center;flex:1;">
      <div class="legende" id="legende"></div>
      <div class="meta" id="meta">Chargement…</div>
    </div>
  </div>
  
  <div class="slider-container">
    <label class="slider-label">Navigation :</label>
    <input type="range" id="slider" min="0" max="100" value="50">
    <span id="slider-date" style="font-size:12px;color:var(--texte-mention);min-width:100px;"></span>
  </div>

  <div class="scroll" id="scroll">
    <div class="grid-wrapper">
      <div class="labels-col" id="labels-col">
        <div class="corner">Tâche</div>
        <div id="labels"></div>
      </div>
      <div style="flex:1;overflow:auto;position:relative;">
        <div id="kanban" class="grid"></div>
      </div>
    </div>
  </div>
</div>

<script>
const STATUTS = [
  {nom:"À planifier", cls:"st-planifier", couleur:"var(--st-planifier)"},
  {nom:"En cours",    cls:"st-encours",   couleur:"var(--st-encours)"},
  {nom:"En attente",  cls:"st-attente",   couleur:"var(--st-attente)"},
  {nom:"Terminé",     cls:"st-termine",   couleur:"var(--st-termine)"},
  {nom:"Annulé",      cls:"st-annule",    couleur:"var(--st-annule)"},
];

const JOURS=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

function statutInfo(v){
  const s = (v||"").toString().trim();
  return STATUTS.find(x => x.nom.toLowerCase() === s.toLowerCase())
      || {nom:s||"—", cls:"st-planifier", couleur:"var(--st-planifier)"};
}

function norm(s){
  return (s||"").toString().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]/g,"");
}

function trouverCle(cles, ...cands){
  for(const c of cands){ const n=norm(c);
    const hit=cles.find(k=>norm(k)===n); if(hit) return hit; }
  for(const c of cands){ const n=norm(c);
    const hit=cles.find(k=>norm(k).includes(n)); if(hit) return hit; }
  return null;
}

function parseDate(v){
  if(!v) return null;
  const d = new Date(String(v).trim());
  return isNaN(d.getTime()) ? null : d;
}

function getWeekNumber(d){
  const date = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function getMondayOfWeek(dayIndex){
  const d = new Date(dayIndex * MS_JOUR);
  const dow = d.getUTCDay();
  const diff = d.getUTCDate() - dow + (dow === 0 ? -6 : 1);
  return new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), diff));
}

function countWorkDays(startIdx, endIdx){
  let count = 0;
  for(let i=startIdx;i<=endIdx;i++){
    const d = new Date(i*MS_JOUR);
    const dow = d.getUTCDay();
    if(dow >= 1 && dow <= 5) count++;
  }
  return count;
}

const MS_JOUR=86400000;
function jourIndex(d){ return Math.floor(d.getTime()/MS_JOUR); }
function fmtJJMM(idx){
  const d=new Date(idx*MS_JOUR);
  const jj=String(d.getUTCDate()).padStart(2,"0");
  const mm=String(d.getUTCMonth()+1).padStart(2,"0");
  return jj+"/"+mm;
}

let K=null;
let allData={};
let isSliderChanging=false;

grist.ready({requiredAccess:"read table"});

grist.onRecords(function(records){
  try{ construire(records); }
  catch(e){ console.error(e); }
});

function detecterColonnes(records){
  const cles = records.length ? Object.keys(records[0]) : [];
  return {
    section:  trouverCle(cles,"Section"),
    campagne: trouverCle(cles,"Campagne"),
    tache:    trouverCle(cles,"Tâche","Tache"),
    debut:    trouverCle(cles,"Date_debut"),
    fin:      trouverCle(cles,"Date_fin"),
    duree:    trouverCle(cles,"Duree_jours"),
    statut:   trouverCle(cles,"Statut"),
    resp:     trouverCle(cles,"Responsable"),
  };
}

function construire(records){
  if(!records || records.length===0){
    document.getElementById("kanban").innerHTML='<div class="empty">Aucune tâche à afficher.</div>';
    return;
  }

  K=detecterColonnes(records);

  const taches=records.map((r)=>{
    const debut=parseDate(r[K.debut]);
    const fin=parseDate(r[K.fin]);
    return {
      section:(r[K.section]||"").toString(),
      campagne:(r[K.campagne]||"").toString(),
      tache:(r[K.tache]||"").toString(),
      debut, fin,
      statut:(r[K.statut]||"").toString(),
      resp:(r[K.resp]||"").toString(),
      _di: debut? jourIndex(debut):null,
      _fi: fin?   jourIndex(fin):null,
    };
  });

  const dates=taches.filter(t=>t._di!==null && t._fi!==null);
  
  let minI, maxI;
  if(dates.length){
    minI=Math.min(...dates.map(t=>t._di));
    maxI=Math.max(...dates.map(t=>t._fi));
  }else{
    const today=jourIndex(new Date());
    minI=today-14; maxI=today+21;
  }

  const totalJours=maxI-minI+1;
  const tlW=totalJours*16;

  const todayI=jourIndex(new Date());
  const todayOffset=todayI-minI;
  const todayVisible=(todayI>=minI && todayI<=maxI);

  allData={taches, minI, maxI, todayI, todayOffset, totalJours, tlW, todayVisible};

  const sections=[];
  const idxSec={}, idxCamp={};
  taches.forEach(t=>{
    if(!(t.section in idxSec)){ idxSec[t.section]=sections.length;
      sections.push({nom:t.section,campagnes:[]}); }
    const S=sections[idxSec[t.section]];
    const kc=t.section+"||"+t.campagne;
    if(!(kc in idxCamp)){ idxCamp[kc]=S.campagnes.length;
      S.campagnes.push({nom:t.campagne,taches:[]}); }
    S.campagnes[idxCamp[kc]].taches.push(t);
  });
  sections.forEach(S=>S.campagnes.forEach(C=>C.taches.sort((a,b)=>{
    if(a._di===null && b._di===null) return 0;
    if(a._di===null) return 1;
    if(b._di===null) return -1;
    return a._di-b._di;
  })));

  // Rendu labels
  const labelsDiv=document.getElementById("labels");
  labelsDiv.innerHTML="";
  sections.forEach(S=>{
    labelsDiv.appendChild(el("div","label section",S.nom));
    S.campagnes.forEach(C=>{
      labelsDiv.appendChild(el("div","label campagne",C.nom));
      C.taches.forEach(t=>{
        const lab=el("div","label tache");
        const nom=el("span","nom",t.tache); lab.appendChild(nom);
        if(t.resp){ lab.appendChild(el("span","resp","· "+t.resp)); }
        labelsDiv.appendChild(lab);
      });
    });
  });

  // Rendu timeline
  const grid=document.createElement("div");
  grid.className="grid";
  grid.style.setProperty("--tl-w", tlW+"px");
  grid.style.setProperty("--today", todayOffset);

  const head=el("div","head-track");
  const headInner=el("div","head-inner");
  
  // Affichage semaines avec labels
  let currentWeek=null;
  for(let i=minI;i<=maxI;i+=7){
    const weekLabel=el("div","week-label");
    const d=new Date(i*MS_JOUR);
    const wn=getWeekNumber(d);
    
    // Trouver lundi et vendredi
    let mondayIdx=i;
    let fridayIdx=i+4;
    if(fridayIdx>maxI) fridayIdx=maxI;
    
    const mondayDate=new Date(mondayIdx*MS_JOUR);
    const fridayDate=new Date(fridayIdx*MS_JOUR);
    
    const mondayDay=JOURS[mondayDate.getUTCDay()];
    const fridayDay=JOURS[fridayDate.getUTCDay()];
    const workDays=countWorkDays(mondayIdx, fridayIdx);
    
    const line1=`S${wn}`;
    const line2=`${mondayDay} ${fmtJJMM(mondayIdx)} au ${fridayDay} ${fmtJJMM(fridayIdx)}`;
    const line3=`(${workDays} j. ouvrés)`;
    
    weekLabel.style.left=((i-minI)*16)+"px";
    weekLabel.innerHTML=`${line1}<br>${line2}<br>${line3}`;
    headInner.appendChild(weekLabel);
  }
  
  head.appendChild(headInner);
  grid.appendChild(head);

  sections.forEach(S=>{
    grid.appendChild(el("div","track section"));
    S.campagnes.forEach(C=>{
      grid.appendChild(el("div","track campagne"));
      C.taches.forEach(t=>{
        const track=el("div","track tache"+(todayVisible?"":" no-today"));
        if(t._di!==null){
          const info=statutInfo(t.statut);
          const barre=el("div","barre "+info.cls);
          const left=(t._di-minI)*16;
          const largeur=Math.max(16,(t._fi-t._di+1)*16);
          barre.style.left=left+"px";
          barre.style.width=largeur+"px";
          barre.style.background=info.couleur;
          barre.textContent=t.tache;
          barre.title=`${t.tache}\n${info.nom}\n${fmtJJMM(t._di)} → ${fmtJJMM(t._fi)}`;
          track.appendChild(barre);
        }else{
          track.appendChild(el("div","pill-plan","à planifier"));
        }
        grid.appendChild(track);
      });
    });
  });

  document.getElementById("kanban").innerHTML="";
  document.getElementById("kanban").appendChild(grid);

  document.getElementById("meta").textContent=`${taches.length} tâche${taches.length>1?"s":""}`;

  rendreLegende();
  setupSlider();
  setupResize();
  
  // Centrer sur aujourd'hui avec délai
  setTimeout(scrollToToday, 200);
}

function scrollToToday(){
  const scroll=document.getElementById("scroll");
  if(allData.todayOffset===undefined) return;
  
  const leftPos = (allData.todayOffset * 16) - (scroll.clientWidth / 3);
  scroll.scrollLeft = Math.max(0, leftPos);
  updateSlider();
}

function setupSlider(){
  const slider=document.getElementById("slider");
  const scroll=document.getElementById("scroll");
  
  slider.addEventListener("input", ()=>{
    isSliderChanging=true;
    const pct=slider.value/100;
    const maxScroll=scroll.scrollWidth-scroll.clientWidth;
    scroll.scrollLeft=pct*maxScroll;
    updateSlider();
    isSliderChanging=false;
  });
}

function updateSlider(){
  if(isSliderChanging) return;
  
  const scroll=document.getElementById("scroll");
  const slider=document.getElementById("slider");
  const maxScroll=scroll.scrollWidth-scroll.clientWidth;
  
  if(maxScroll<=0){
    slider.value=50;
  } else {
    const pct=(scroll.scrollLeft/maxScroll)*100;
    slider.value=Math.max(0, Math.min(100, pct));
  }
  
  if(allData.minI){
    const pixelsLeft=scroll.scrollLeft;
    const dayOffset=Math.round(pixelsLeft/16);
    const idx=allData.minI+dayOffset;
    document.getElementById("slider-date").textContent=fmtJJMM(idx);
  }
}

document.getElementById("scroll").addEventListener("scroll", updateSlider);

function setupResize(){
  const col=document.getElementById("labels-col");
  let isResizing=false;
  let startX, startW;
  
  col.addEventListener("mousedown", (e)=>{
    if(e.offsetX > col.clientWidth-5){
      isResizing=true;
      startX=e.clientX;
      startW=col.clientWidth;
      document.body.style.cursor="col-resize";
    }
  });
  
  document.addEventListener("mousemove", (e)=>{
    if(!isResizing) return;
    const delta=e.clientX-startX;
    const newW=Math.max(200, startW+delta);
    document.documentElement.style.setProperty("--label-w", newW+"px");
  });
  
  document.addEventListener("mouseup", ()=>{
    isResizing=false;
    document.body.style.cursor="auto";
  });
}

function rendreLegende(){
  const l=document.getElementById("legende");
  l.innerHTML="";
  STATUTS.forEach(s=>{
    const item=el("div","item");
    const puce=el("span","puce"); puce.style.background=s.couleur;
    item.appendChild(puce); item.appendChild(document.createTextNode(s.nom));
    l.appendChild(item);
  });
}

function el(tag,cls,txt){
  const e=document.createElement(cls?"div":tag);
  if(cls) e.className=cls;
  if(txt!==undefined && txt!==null) e.textContent=txt;
  return e;
}
</script>
</body>
</html>
