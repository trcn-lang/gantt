<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban par Porteur</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  :root{
    --bleu-france:#000091;
    --bleu-975:#ECECFE;
    --texte:#161616;
    --texte-mention:#666666;
    --bordure:#DDDDDD;
    --fond:#FFFFFF;
    --fond-alt:#F6F6F6;
    --st-faire:#929292;
    --st-encours:#0063CB;
    --st-termine:#18753C;
    --label-w:200px;
    --col-w:300px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Marianne",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    color:var(--texte);
    background:var(--fond);
    font-size:14px;
  }

  .app{display:flex;flex-direction:column;height:100vh}

  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    gap:16px;padding:12px 16px;border-bottom:1px solid var(--bordure);
    flex-wrap:wrap;
  }
  .topbar h1{font-size:18px;font-weight:700;color:var(--bleu-france);}
  .meta{font-size:12px;color:var(--texte-mention)}

  .legende{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .legende .item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--texte-mention)}
  .legende .puce{width:12px;height:12px;border-radius:3px;flex:0 0 auto}

  .toolbar{
    padding:12px 16px;border-bottom:1px solid var(--bordure);
    display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  }
  .toolbar select{
    padding:6px 10px;border:1px solid var(--bordure);border-radius:4px;font-size:13px;background:#fff;
  }
  .toolbar label{font-size:12px;color:var(--texte-mention);font-weight:600}

  .btn{
    padding:8px 16px;background:var(--bleu-france);color:#fff;border:none;
    border-radius:4px;cursor:pointer;font-size:13px;font-weight:600;transition:background 0.2s;
  }
  .btn:hover{background:#0056b3}
  .btn-danger{background:#CE0500}
  .btn-danger:hover{background:#a80400}
  .btn-cancel{background:#ccc;color:#000}
  .btn-cancel:hover{background:#aaa}

  .scroll{flex:1;overflow:auto;position:relative}

  .matrix{
    display:grid;
    grid-template-columns:var(--label-w) repeat(var(--n-cols,3), minmax(var(--col-w), 1fr));
    align-content:start;
    min-width:fit-content;
  }

  .corner{
    position:sticky;top:0;left:0;z-index:6;
    background:var(--fond);border-right:1px solid var(--bordure);border-bottom:1px solid var(--bordure);
    padding:0 12px;display:flex;align-items:center;font-size:12px;font-weight:700;color:var(--texte-mention);
    height:56px;flex-shrink:0;
  }

  .col-header{
    position:sticky;top:0;z-index:5;
    background:var(--fond);border-bottom:1px solid var(--bordure);border-left:1px solid var(--bordure);
    height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  }
  .col-header .nom{font-size:13px;font-weight:700}
  .col-header .count{
    font-size:11px;color:#fff;background:var(--texte-mention);border-radius:10px;padding:1px 8px;
  }

  .row-label{
    position:sticky;left:0;z-index:4;
    background:var(--bleu-975);border-right:1px solid var(--bordure);border-bottom:1px solid var(--bordure);
    padding:10px 12px;display:flex;flex-direction:column;justify-content:center;gap:2px;
    min-height:80px;
  }
  .row-label.non-assigne{background:var(--fond-alt)}
  .row-label .nom{font-size:13px;font-weight:700;color:var(--bleu-france)}
  .row-label.non-assigne .nom{color:var(--texte-mention);font-style:italic}
  .row-label .count{font-size:11px;color:var(--texte-mention)}

  .cell{
    border-bottom:1px solid var(--bordure);border-left:1px solid var(--bordure);
    padding:8px;display:flex;flex-direction:column;gap:8px;min-height:80px;
    transition:background 0.15s;
  }
  .cell.drag-over{background:var(--bleu-975)}

  .card{
    background:#fff;border:1px solid var(--bordure);border-left:4px solid var(--st-faire);
    border-radius:6px;padding:8px 10px;cursor:grab;
    box-shadow:0 1px 2px rgba(0,0,0,0.06);transition:box-shadow 0.15s, transform 0.15s;
  }
  .card:hover{box-shadow:0 3px 8px rgba(0,0,0,0.12);transform:translateY(-1px)}
  .card.dragging{opacity:0.4}
  .card.st-encours{border-left-color:var(--st-encours)}
  .card.st-termine{border-left-color:var(--st-termine)}
  .card .titre{font-size:13px;font-weight:700;margin-bottom:4px;line-height:1.3}
  .card .badge-proj{
    display:inline-block;font-size:10px;color:var(--bleu-france);background:var(--bleu-975);
    border-radius:10px;padding:1px 8px;margin-bottom:4px;
  }
  .card .dep-line{
    font-size:11px;color:var(--texte);line-height:1.3;margin-bottom:3px;
    display:flex;gap:5px;align-items:baseline;
  }
  .card .dep-line .puce{flex:0 0 auto;font-size:9px}
  .card .commentaire{
    font-size:11px;color:var(--texte-mention);font-style:italic;margin-bottom:4px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .card .dates{font-size:11px;color:var(--texte-mention);display:flex;align-items:center;gap:4px}


  .btn-add-cell{
    background:none;border:1px dashed var(--bordure);color:var(--texte-mention);
    border-radius:4px;padding:6px;font-size:12px;cursor:pointer;text-align:center;
  }
  .btn-add-cell:hover{background:var(--fond-alt);border-color:var(--bleu-france);color:var(--bleu-france)}

  .modal-overlay{
    position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);
    display:none;align-items:center;justify-content:center;z-index:1000;
  }
  .modal-overlay.active{display:flex}
  .modal{
    background:#fff;border-radius:8px;padding:24px;max-width:500px;width:90%;max-height:90vh;overflow-y:auto;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
  }
  .modal h2{font-size:18px;margin-bottom:16px;color:var(--bleu-france)}
  .form-group{margin-bottom:16px}
  .form-group label{display:block;font-weight:600;margin-bottom:6px;font-size:13px}
  .form-group input,.form-group textarea,.form-group select{
    width:100%;padding:8px 12px;border:1px solid var(--bordure);border-radius:4px;font-size:13px;
  }
  .form-group input[readonly]{background:var(--fond-alt);color:var(--texte-mention)}
  .form-group textarea{resize:vertical;min-height:70px}
  .form-actions{display:flex;gap:8px;margin-top:24px;justify-content:space-between}
  .form-actions .right{display:flex;gap:8px}

  .info-box{
    background:#FFF3CD;border:1px solid #FFC107;border-radius:4px;padding:12px;margin-bottom:16px;font-size:12px;
    color:#856404;line-height:1.4;
  }
  .info-box.warning{background:#F8D7DA;border-color:#F5C6CB;color:#721C24}

  .multi-select{
    border:1px solid var(--bordure);border-radius:4px;padding:8px;max-height:150px;overflow-y:auto;
  }
  .multi-select-item{
    display:flex;align-items:center;gap:8px;padding:6px 8px;cursor:pointer;border-radius:3px;
  }
  .multi-select-item:hover{background:var(--fond-alt)}
  .multi-select-item input[type="checkbox"]{cursor:pointer}

  .empty-state{padding:40px;text-align:center;color:var(--texte-mention)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>Kanban par Porteur</h1>
    <div style="display:flex;gap:20px;align-items:center;flex:1;">
      <div class="legende" id="legende"></div>
      <div class="meta" id="meta">Chargement…</div>
    </div>
  </div>

  <div class="toolbar">
    <button class="btn" id="btn-add-tache">+ Tâche</button>
    <label>Projet :</label>
    <select id="filtre-projet"><option value="">Tous</option></select>
    <span style="margin-left:auto;font-size:12px;color:var(--texte-mention)" id="status"></span>
  </div>

  <div class="scroll" id="scroll">
    <div class="matrix" id="matrix"></div>
  </div>
</div>

<!-- MODALE TACHE (création + édition) -->
<div class="modal-overlay" id="modal-tache">
  <div class="modal">
    <h2 id="modal-tache-title">Nouvelle Tâche</h2>
    <input type="hidden" id="field-tache-id">

    <div id="info-preds" class="info-box" style="display:none;"></div>
    <div id="info-blocked" class="info-box warning" style="display:none;"></div>

    <div class="form-group"><label>Tâche *</label><input type="text" id="field-tache-nom" placeholder="ex: Publication liste"></div>
    <div class="form-group"><label>Projet *</label><select id="field-tache-projet"></select></div>
    <div class="form-group"><label>Date début *</label><input type="date" id="field-tache-debut"></div>
    <div class="form-group"><label>Date fin *</label><input type="date" id="field-tache-fin"></div>
    <div class="form-group"><label>Durée (jours ouvrés)</label><input type="number" id="field-tache-duree" readonly placeholder="calculée automatiquement"></div>
    <div class="form-group"><label>Porteur</label><select id="field-tache-porteur"></select></div>
    <div class="form-group"><label>Statut</label><select id="field-tache-statut"></select></div>

    <div class="form-group">
      <label>Prédécesseurs (tâches dont dépend celle-ci)</label>
      <div class="multi-select" id="field-tache-predecesseurs"></div>
    </div>

    <div class="form-group">
      <label>Livrable(s) déclencheur(s) (jalons dont dépend cette tâche)</label>
      <div class="multi-select" id="field-tache-jalons-declencheurs"></div>
    </div>

    <div class="form-group"><label>Commentaires</label><textarea id="field-tache-comments" placeholder="Notes optionnelles"></textarea></div>
    <div class="form-actions">
      <button class="btn btn-danger" id="btn-delete-tache" style="display:none" onclick="deleteTache()">Supprimer</button>
      <div class="right">
        <button class="btn btn-cancel" onclick="closeModal('modal-tache')">Annuler</button>
        <button class="btn" id="btn-save-tache" onclick="saveTache()">Créer</button>
      </div>
    </div>
  </div>
</div>

<script>
const STATUTS = [
  {nom:"À faire",   cls:"st-faire",    couleur:"var(--st-faire)"},
  {nom:"En cours",  cls:"st-encours",  couleur:"var(--st-encours)"},
  {nom:"Terminé",   cls:"st-termine",  couleur:"var(--st-termine)"},
];
let NON_ATTRIBUE_ID = null;
let PERT_DATA = {};

function norm(s){
  return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}
function statutInfo(s){
  return STATUTS.find(x=>norm(x.nom)===norm(s)) || STATUTS[0];
}
function cssVarValue(v){
  return getComputedStyle(document.documentElement).getPropertyValue(v.replace("var(","").replace(")","").trim())||v;
}
function parseDate(v){
  if(v===null||v===undefined||v==="") return null;
  if(typeof v==="number") return new Date(v*1000);
  const d=new Date(String(v).trim());
  return isNaN(d.getTime())?null:d;
}
function dayIndex(v){
  const d=parseDate(v);
  return d?Math.floor(d.getTime()/86400000):null;
}
function refId(v){
  if(Array.isArray(v)) return v[1];
  return v;
}
function resolveRef(table, id, col){
  const rid=refId(id);
  if(rid===null||rid===undefined) return null;
  const ligne=table.find(row=>row.id===rid);
  return ligne?ligne[col]:null;
}
function fmtJJMM(v){
  const d=parseDate(v);
  if(!d) return "";
  return String(d.getUTCDate()).padStart(2,"0")+"/"+String(d.getUTCMonth()+1).padStart(2,"0");
}
function toDateInput(v){
  const d=parseDate(v);
  if(!d) return "";
  const jj=String(d.getUTCDate()).padStart(2,"0");
  const mm=String(d.getUTCMonth()+1).padStart(2,"0");
  return `${d.getUTCFullYear()}-${mm}-${jj}`;
}
// ✅ Jours fériés français (fixes + mobiles calculés automatiquement, valable toute année)
function datePaques(annee){
  // Algorithme de Meeus/Jones/Butcher
  const a = annee % 19;
  const b = Math.floor(annee / 100);
  const c = annee % 100;
  const d = Math.floor(b / 4);
  const e = b % 4;
  const f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4);
  const k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const mois = Math.floor((h + l - 7 * m + 114) / 31);
  const jour = ((h + l - 7 * m + 114) % 31) + 1;
  return new Date(annee, mois - 1, jour);
}

function joursFeriesAnnee(annee){
  const paques = datePaques(annee);
  const addJours = (date, n) => { const d = new Date(date); d.setDate(d.getDate() + n); return d; };
  const cles = (d) => `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;

  const feries = [
    new Date(annee, 0, 1),    // Jour de l'an
    addJours(paques, 1),      // Lundi de Pâques
    new Date(annee, 4, 1),    // Fête du travail
    new Date(annee, 4, 8),    // Victoire 1945
    addJours(paques, 39),     // Ascension
    addJours(paques, 50),     // Lundi de Pentecôte
    new Date(annee, 6, 14),   // Fête nationale
    new Date(annee, 7, 15),   // Assomption
    new Date(annee, 10, 1),   // Toussaint
    new Date(annee, 10, 11),  // Armistice 1918
    new Date(annee, 11, 25),  // Noël
  ];
  return new Set(feries.map(cles));
}

const CACHE_FERIES = {};
function estFerie(date){
  const annee = date.getFullYear();
  if(!CACHE_FERIES[annee]) CACHE_FERIES[annee] = joursFeriesAnnee(annee);
  const cle = `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`;
  return CACHE_FERIES[annee].has(cle);
}

function joursOuvres(d1, d2){
  let n=0;
  const cur=new Date(d1);
  while(cur<=d2){
    const j=cur.getDay();
    if(j!==0 && j!==6 && !estFerie(cur)) n++;
    cur.setDate(cur.getDate()+1);
  }
  return n;
}

// Utilitaires jours ouvrés pour la propagation PERT (chemin critique)
function estJourOuvre(date){
  const j=date.getDay();
  return j!==0 && j!==6 && !estFerie(date);
}
function jourOuvreSuivant(date){
  const d=new Date(date);
  d.setDate(d.getDate()+1);
  while(!estJourOuvre(d)) d.setDate(d.getDate()+1);
  return d;
}
function jourOuvrePrecedent(date){
  const d=new Date(date);
  d.setDate(d.getDate()-1);
  while(!estJourOuvre(d)) d.setDate(d.getDate()-1);
  return d;
}
// Renvoie la date de fin après n jours ouvrés en comptant "date" comme jour 1 (cohérent avec Duree_jours)
function ajouterJoursOuvres(date, n){
  const d=new Date(date);
  let restant=Math.max(1,n)-1;
  while(restant>0){
    d.setDate(d.getDate()+1);
    if(estJourOuvre(d)) restant--;
  }
  return d;
}
// Opération inverse : retrouve la date de début connaissant la fin et la durée en jours ouvrés
function soustraireJoursOuvres(date, n){
  const d=new Date(date);
  let restant=Math.max(1,n)-1;
  while(restant>0){
    d.setDate(d.getDate()-1);
    if(estJourOuvre(d)) restant--;
  }
  return d;
}

let DB={};
let draggedTaskId=null;
let filtreProjet="";

grist.ready({requiredAccess:"full"});

function columnarToRows(data){
  if(!data || typeof data!=="object") return [];
  if(Array.isArray(data)) return data;
  const keys=Object.keys(data);
  if(keys.length===0) return [];
  const firstCol=data[keys[0]];
  if(!Array.isArray(firstCol)) return [];
  const rows=[];
  for(let i=0;i<firstCol.length;i++){
    const row={};
    keys.forEach(k=>row[k]=data[k][i]);
    rows.push(row);
  }
  return rows;
}

// ========== DÉPENDANCES / PERT ==========

function getPredecessorTasks(task){
  const raw = task.Predecesseurs;
  if(!raw) return [];
  if(!Array.isArray(raw)) return [];

  // Format Grist pour une liste de références : ['L', id1, id2, ...]
  if(raw[0] === 'L'){
    return raw.slice(1)
      .map(id => DB.taches.find(t => t.id === id))
      .filter(Boolean);
  }
  // Cellule corrompue (ex: ancienne sauvegarde erronée) → on ignore
  if(raw[0] === 'E'){
    console.warn("⚠️ Cellule Predecesseurs corrompue pour la tâche", task.id, "- réenregistrez la tâche pour corriger.");
    return [];
  }
  // Fallback : tableau déjà composé d'IDs bruts
  return raw
    .map(id => (typeof id === 'object' ? id : DB.taches.find(t => t.id === id)))
    .filter(Boolean);
}

function getPredecessorsBlocked(task){
  const preds = getPredecessorTasks(task);
  return preds.filter(pred => {
    const predStatut = resolveRef(DB.parametres, pred.Statut, "Statut");
    return norm(predStatut) !== norm("Terminé");
  });
}

// Liens Livrable : un jalon peut requérir des tâches, une tâche peut être déclenchée par des jalons
function parseListeReference(raw, table){
  if(!raw) return [];
  if(!Array.isArray(raw)) return [];
  if(raw[0] === 'L'){
    return raw.slice(1).map(id => table.find(x => x.id === id)).filter(Boolean);
  }
  if(raw[0] === 'E') return [];
  return raw.map(id => (typeof id === 'object' ? id : table.find(x => x.id === id))).filter(Boolean);
}
function getJalonTachesRequises(jalon){
  return parseListeReference(jalon.Taches_requises, DB.taches);
}
// Décode le format "Choix multiple" de Grist (['L', 'Livrable']) en simple texte
function getJalonTypeTexte(jalon){
  const raw = jalon.Type;
  if(!raw) return "";
  if(Array.isArray(raw)){
    if(raw[0]==='L') return raw[1] || "";
    if(raw[0]==='E') return "";
    return "";
  }
  return raw;
}
function getTacheJalonsDeclencheurs(task){
  return parseListeReference(task.Jalon_declencheur, DB.jalons);
}
function getJalonAtteint(jalon){
  const requises = getJalonTachesRequises(jalon);
  if(requises.length > 0){
    return requises.every(t => norm(resolveRef(DB.parametres, t.Statut, "Statut")) === norm("Terminé"));
  }
  const d = parseDate(jalon.Date);
  return d ? (Date.now() >= d.getTime()) : false;
}
// Jalons-livrables que CETTE tâche conditionne (elle fait partie de leurs Taches_requises)
function getJalonsConditionnesParTache(task){
  return DB.jalons.filter(j => norm(getJalonTypeTexte(j))===norm("Livrable") && getJalonTachesRequises(j).some(t=>t.id===task.id));
}

// Détection de cycle unifiée sur le graphe mixte Tâches + Jalons (liens Livrable)
function getSuccessorsUnifies(nodeKey){
  const [type, idStr] = nodeKey.split(':');
  const id = parseInt(idStr);
  const succ = [];
  if(type === 'T'){
    DB.taches.forEach(t=>{ if(getPredecessorTasks(t).some(p=>refId(p.id||p)===id)) succ.push('T:'+t.id); });
    DB.jalons.forEach(j=>{ if(getJalonTachesRequises(j).some(x=>x.id===id)) succ.push('J:'+j.id); });
  } else {
    DB.taches.forEach(t=>{ if(getTacheJalonsDeclencheurs(t).some(x=>x.id===id)) succ.push('T:'+t.id); });
  }
  return succ;
}
function isDescendantUnifie(startKey, candidateKey, visited){
  visited = visited || new Set();
  if(startKey === candidateKey) return true;
  if(visited.has(startKey)) return false;
  visited.add(startKey);
  for(const succ of getSuccessorsUnifies(startKey)){
    if(isDescendantUnifie(succ, candidateKey, visited)) return true;
  }
  return false;
}

// Vérifie si candidateId est déjà un "successeur" (direct ou indirect) de taskId.
// Si oui, ajouter candidateId comme prédécesseur de taskId créerait un cycle.
function isDescendant(taskId, candidateId, visited){
  visited = visited || new Set();
  if(taskId === candidateId) return true;
  if(visited.has(taskId)) return false;
  visited.add(taskId);
  const successeurs = DB.taches.filter(t => getPredecessorTasks(t).some(p => refId(p.id||p) === taskId));
  for(const succ of successeurs){
    if(isDescendant(succ.id, candidateId, visited)) return true;
  }
  return false;
}

function detectCycles(){
  const visited = new Set();
  const stack = new Set();
  function hasCycle(taskId){
    if(stack.has(taskId)) return true;
    if(visited.has(taskId)) return false;
    visited.add(taskId); stack.add(taskId);
    const task = DB.taches.find(t => t.id === taskId);
    if(task){
      for(const pred of getPredecessorTasks(task)){
        if(hasCycle(refId(pred.id||pred))) return true;
      }
    }
    stack.delete(taskId);
    return false;
  }
  return DB.taches.some(t => hasCycle(t.id));
}

// Calcule les dates au plus tôt / au plus tard / marge pour un sous-ensemble de tâches
// (un projet à la fois), de façon totalement indépendante des autres projets.
function calculerPertPourTaches(tasksScope){
  const scopeIds = new Set(tasksScope.map(t=>t.id));

  const memoEarly = {};
  function getEarlyStart(taskId){
    if(memoEarly[taskId] !== undefined) return memoEarly[taskId];
    const task = tasksScope.find(t => t.id === taskId);
    if(!task){ memoEarly[taskId] = null; return null; }
    // On ignore les prédécesseurs qui seraient dans un autre projet
    const preds = getPredecessorTasks(task).filter(p => scopeIds.has(refId(p.id||p)));
    if(preds.length === 0){
      memoEarly[taskId] = parseDate(task.Date_debut);
      return memoEarly[taskId];
    }
    let maxEnd = null;
    for(const pred of preds){
      const predTask = tasksScope.find(t => t.id === refId(pred.id||pred));
      if(!predTask) continue;
      const predStart = getEarlyStart(predTask.id);
      if(!predStart) continue;
      const predEnd = ajouterJoursOuvres(predStart, predTask.Duree_jours||1);
      if(!maxEnd || predEnd > maxEnd) maxEnd = predEnd;
    }
    memoEarly[taskId] = maxEnd ? jourOuvreSuivant(maxEnd) : parseDate(task.Date_debut);
    return memoEarly[taskId];
  }
  tasksScope.forEach(t=>{
    const early = getEarlyStart(t.id);
    PERT_DATA[t.id] = PERT_DATA[t.id] || {};
    PERT_DATA[t.id].earlyStart = early;
    if(early){
      PERT_DATA[t.id].earlyEnd = ajouterJoursOuvres(early, t.Duree_jours||1);
    }
  });

  // Fin du "projet" = fin du projet propre à CE PROJET uniquement
  let projectEnd = null;
  tasksScope.forEach(t=>{
    const ee = PERT_DATA[t.id] && PERT_DATA[t.id].earlyEnd;
    if(ee && (!projectEnd || ee > projectEnd)) projectEnd = ee;
  });
  if(!projectEnd) return;

  const memoLate = {};
  function getLateEnd(taskId){
    if(memoLate[taskId] !== undefined) return memoLate[taskId];
    const task = tasksScope.find(t => t.id === taskId);
    if(!task){ memoLate[taskId] = null; return null; }
    const successeurs = tasksScope.filter(t => getPredecessorTasks(t).some(p => refId(p.id||p) === taskId));
    if(successeurs.length === 0){
      memoLate[taskId] = projectEnd;
      return projectEnd;
    }
    let minStart = null;
    for(const succ of successeurs){
      const succLateEnd = getLateEnd(succ.id);
      if(succLateEnd){
        const succLateStart = soustraireJoursOuvres(succLateEnd, succ.Duree_jours||1);
        if(!minStart || succLateStart < minStart) minStart = succLateStart;
      }
    }
    memoLate[taskId] = minStart ? jourOuvrePrecedent(minStart) : projectEnd;
    return memoLate[taskId];
  }
  tasksScope.forEach(t=>{
    const lateEnd = getLateEnd(t.id);
    PERT_DATA[t.id] = PERT_DATA[t.id] || {};
    PERT_DATA[t.id].lateEnd = lateEnd;
    if(lateEnd){
      PERT_DATA[t.id].lateStart = soustraireJoursOuvres(lateEnd, t.Duree_jours||1);
    }
  });

  tasksScope.forEach(t=>{
    const ls = PERT_DATA[t.id].lateStart, es = PERT_DATA[t.id].earlyStart;
    if(ls && es){
      const slack = ls >= es ? joursOuvres(es, ls) - 1 : 0;
      PERT_DATA[t.id].slack = Math.max(0, slack);
      PERT_DATA[t.id].isCritical = (PERT_DATA[t.id].slack === 0);
    }
  });
}

async function calculatePERT(){
  if(detectCycles()){
    console.error("❌ Cycle détecté dans les dépendances");
    document.getElementById("status").textContent = "❌ Cycle dans les dépendances !";
    return;
  }
  PERT_DATA = {};
  // Regroupement des tâches par projet : chaque projet a ses propres
  // dates au plus tôt / au plus tard, indépendamment des autres.
  const groupes = {};
  DB.taches.forEach(t=>{
    const cle = refId(t.Projet) ?? "sans_projet";
    if(!groupes[cle]) groupes[cle] = [];
    groupes[cle].push(t);
  });
  Object.values(groupes).forEach(tasksScope => calculerPertPourTaches(tasksScope));

  const actions = [];
  DB.taches.forEach(t=>{
    const d = PERT_DATA[t.id];
    if(!d) return;
    actions.push(["UpdateRecord","Taches",t.id,{
      Date_au_plus_tot: d.earlyStart ? Math.floor(d.earlyStart.getTime()/1000) : null,
      Date_au_plus_tard: d.lateEnd ? Math.floor(d.lateEnd.getTime()/1000) : null,
      Marge_totale: d.slack !== undefined ? d.slack : null,
      Est_critique: !!d.isCritical,
      Chemin_critique: d.isCritical ? "Oui" : "Non"
    }]);
  });
  if(actions.length){
    try{ await grist.docApi.applyUserActions(actions); }
    catch(e){ console.error("❌ Erreur sauvegarde PERT:", e); }
  }
  syncPertIntoDB();
}

// Reporte les résultats PERT (calculés en mémoire) dans DB.taches pour un affichage immédiat
function syncPertIntoDB(){
  DB.taches.forEach(t=>{
    const d = PERT_DATA[t.id];
    if(!d) return;
    t.Est_critique = !!d.isCritical;
    t.Marge_totale = d.slack !== undefined ? d.slack : t.Marge_totale;
  });
}

async function init(){
  try{
    document.getElementById("status").textContent="Chargement...";
    DB.projets      = columnarToRows(await grist.docApi.fetchTable("Projets"));
    DB.taches       = columnarToRows(await grist.docApi.fetchTable("Taches"));
    DB.jalons       = columnarToRows(await grist.docApi.fetchTable("Jalons"));
    DB.porteurs     = columnarToRows(await grist.docApi.fetchTable("Porteurs"));
    DB.parametres   = columnarToRows(await grist.docApi.fetchTable("PARAMETRES"));

    // ✅ FIX: S'assurer qu'un porteur réel "Non attribué" existe (plus robuste que null)
    let nonAttribue = DB.porteurs.find(r => norm(r.Nom) === norm("Non attribué"));
    if(!nonAttribue){
      const result = await grist.docApi.applyUserActions([
        ["AddRecord","Porteurs",null,{Nom:"Non attribué"}]
      ]);
      DB.porteurs = columnarToRows(await grist.docApi.fetchTable("Porteurs"));
      nonAttribue = DB.porteurs.find(r => norm(r.Nom) === norm("Non attribué"));
    }
    NON_ATTRIBUE_ID = nonAttribue ? nonAttribue.id : null;

    populateSelects();
    construire();
    document.getElementById("status").textContent="✓ Données chargées";
  }catch(e){
    console.error("❌", e);
    document.getElementById("status").textContent="❌ "+e.message;
  }
}

function fillSelect(id, values, placeholder){
  const sel=document.getElementById(id);
  const prev=sel.value;
  sel.innerHTML=`<option value="">${placeholder}</option>`;
  values.forEach(v=>{
    const opt=document.createElement("option");
    opt.value=v.value; opt.textContent=v.label;
    sel.appendChild(opt);
  });
  if(prev) sel.value=prev;
}
function uniq(arr){ return arr.filter((v,i,a)=>a.indexOf(v)===i); }

function populateSelects(){
  fillSelect("field-tache-projet", DB.projets.map(c=>({value:c.id, label:c.Projet})), "-- Sélectionner --");
  fillSelect("field-tache-statut", STATUTS.map(s=>({value:s.nom, label:s.nom})), "-- Sélectionner --");
  fillSelect("field-tache-porteur", DB.porteurs.map(r=>({value:r.Nom, label:r.Nom})), "-- Aucun --");

  const filtreSel=document.getElementById("filtre-projet");
  const prev=filtreSel.value;
  filtreSel.innerHTML='<option value="">Tous</option>';
  DB.projets.forEach(c=>{
    const opt=document.createElement("option");
    opt.value=c.id; opt.textContent=c.Projet;
    filtreSel.appendChild(opt);
  });
  filtreSel.value=prev;
}

  const debut=document.getElementById("field-tache-debut").value;
  const fin=document.getElementById("field-tache-fin").value;
  if(debut && fin){
    const n=joursOuvres(new Date(debut), new Date(fin));

}

function openTacheEdit(t){
  const duree=t.Duree_jours||1;

  // ✅ FIX: On lit Date_fin directement si présente (nouvelles tâches).
  // Fallback: reconstruction pour les tâches créées avant ce correctif.
  let finValue = t.Date_fin;
  if(!finValue){
    const debutDate=parseDate(t.Date_debut);
    let finDate=debutDate?new Date(debutDate):null;
    if(finDate && duree>1){
      let restant=duree-1;
      while(restant>0){
        finDate.setDate(finDate.getDate()+1);
        const j=finDate.getDay();
        if(j!==0 && j!==6) restant--;
      }
    }
    finValue = finDate ? Math.floor(finDate.getTime()/1000) : null;
  }

  document.getElementById("field-tache-id").value=t.id;
  document.getElementById("field-tache-nom").value=t.Tache||"";
  document.getElementById("field-tache-projet").value=refId(t.Projet)||"";
  document.getElementById("field-tache-debut").value=toDateInput(t.Date_debut);
  document.getElementById("field-tache-fin").value=finValue?toDateInput(finValue):"";
  document.getElementById("field-tache-duree").value=duree;
  document.getElementById("field-tache-porteur").value=resolveRef(DB.porteurs, t.Porteur, "Nom")||"";
  document.getElementById("field-tache-statut").value=resolveRef(DB.parametres, t.Statut, "Statut")||"";
  document.getElementById("field-tache-comments").value=t.Commentaires||"";
  document.getElementById("modal-tache-title").textContent="Modifier la tâche";
  document.getElementById("btn-save-tache").textContent="Enregistrer";
  document.getElementById("btn-delete-tache").style.display="inline-block";

  const preds = getPredecessorTasks(t);
  if(preds.length > 0){
    const predNames = preds.map(p => p.Tache || p).join(", ");
    document.getElementById("info-preds").innerHTML = `📌 Dépend de : <strong>${predNames}</strong>`;
    document.getElementById("info-preds").style.display="block";
  } else {
    document.getElementById("info-preds").style.display="none";
  }

  const blocked = getPredecessorsBlocked(t);
  const jalonsDecl = getTacheJalonsDeclencheurs(t);
  const jalonsNonAtteints = jalonsDecl.filter(j => !getJalonAtteint(j));
  const messagesBlocage = [];
  if(blocked.length > 0){
    messagesBlocage.push(`en attente de : ${blocked.map(p => p.Tache || p).join(", ")}`);
  }
  if(jalonsNonAtteints.length > 0){
    messagesBlocage.push(`livrable(s) non atteint(s) : ${jalonsNonAtteints.map(j => j.Nom).join(", ")}`);
  }
  if(messagesBlocage.length > 0){
    document.getElementById("info-blocked").innerHTML = `⚠️ <strong>BLOQUÉE :</strong> ${messagesBlocage.join(" · ")}`;
    document.getElementById("info-blocked").style.display="block";
  } else {
    document.getElementById("info-blocked").style.display="none";
  }

  populatePredecessorsSelect(refId(t.Projet), preds);
  populateJalonsDeclencheursSelect(refId(t.Projet), jalonsDecl);
  openModal("modal-tache");
}

function populatePredecessorsSelect(projetId, selectedPreds){
  selectedPreds = selectedPreds || [];
  const container = document.getElementById("field-tache-predecesseurs");
  container.innerHTML = "";

  if(!projetId){
    container.innerHTML = "<div style='padding:8px;color:#999;font-size:11px;'>Sélectionner un projet d'abord</div>";
    return;
  }

  const currentTaskId = parseInt(document.getElementById("field-tache-id").value);
  const projetTasks = DB.taches.filter(t => refId(t.Projet) === projetId && t.id !== currentTaskId);

  if(projetTasks.length === 0){
    container.innerHTML = "<div style='padding:8px;color:#999;font-size:11px;'>Aucune autre tâche dans ce projet</div>";
    return;
  }

  projetTasks.forEach(task=>{
    const isSelected = selectedPreds.some(p => refId(p.id||p) === task.id);
    const label = document.createElement("label");
    label.className = "multi-select-item";
    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.value = task.id;
    checkbox.checked = isSelected;
    label.appendChild(checkbox);
    label.appendChild(document.createTextNode(task.Tache));
    container.appendChild(label);
  });
}

function populateJalonsDeclencheursSelect(projetId, selectedJalons){
  selectedJalons = selectedJalons || [];
  const container = document.getElementById("field-tache-jalons-declencheurs");
  container.innerHTML = "";
  if(!projetId){
    container.innerHTML = "<div style='padding:8px;color:#999;font-size:11px;'>Sélectionner un projet d'abord</div>";
    return;
  }
  const projetJalons = DB.jalons.filter(j => refId(j.Projet) === projetId && norm(getJalonTypeTexte(j))===norm("Livrable"));
  if(projetJalons.length === 0){
    container.innerHTML = "<div style='padding:8px;color:#999;font-size:11px;'>Aucun livrable dans ce projet</div>";
    return;
  }
  projetJalons.forEach(jalon=>{
    const isSelected = selectedJalons.some(j => j.id === jalon.id);
    const label = document.createElement("label");
    label.className = "multi-select-item";
    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.value = jalon.id;
    checkbox.checked = isSelected;
    label.appendChild(checkbox);
    label.appendChild(document.createTextNode(jalon.Nom));
    container.appendChild(label);
  });
}

async function saveTache(){
  const id=document.getElementById("field-tache-id").value;
  const nom=document.getElementById("field-tache-nom").value.trim();
  const projet_id=parseInt(document.getElementById("field-tache-projet").value);
  const debut=document.getElementById("field-tache-debut").value;
  const fin=document.getElementById("field-tache-fin").value;
  const porteur=document.getElementById("field-tache-porteur").value;
  const statut=document.getElementById("field-tache-statut").value;
  const comments=document.getElementById("field-tache-comments").value.trim();
  if(!nom || !projet_id || !debut || !fin){ alert("Champs obligatoires : Tâche, Projet, dates"); return; }

  const duree=joursOuvres(new Date(debut), new Date(fin));

  try{
    const proj=DB.projets.find(c=>c.id===projet_id);
    if(!proj){ alert("Projet non trouvé"); return; }

    const statutId=findParamId("Statut", statut);
    // ✅ Par défaut "Non attribué" si aucun porteur n'est choisi
    const porteurId=findPorteurId(porteur) || NON_ATTRIBUE_ID;

    // ✅ CORRECTION: Chercher le Équipe ID correctement
    const equipeId = refId(proj.Equipe);
    if(!equipeId){ alert("Équipe invalide"); return; }

    // Prédécesseurs sélectionnés + vérification anti-cycle
    const checkboxes = document.querySelectorAll("#field-tache-predecesseurs input[type='checkbox']:checked");
    const predecessorIds = Array.from(checkboxes).map(cb => parseInt(cb.value));

    if(id){
      const currentTaskId = parseInt(id);
      for(const predId of predecessorIds){
        if(isDescendant(currentTaskId, predId)){
          alert("❌ Cycle détecté : cette dépendance créerait une boucle. Sélection annulée.");
          return;
        }
      }
    }

    // ✅ FIX: Grist attend un tableau encodé ['L', id1, id2, ...] pour une Référence multiple
    const predecessorTasks = ['L', ...predecessorIds];

    // Livrables déclencheurs sélectionnés + vérification anti-cycle
    const checkboxesJalons = document.querySelectorAll("#field-tache-jalons-declencheurs input[type='checkbox']:checked");
    const jalonDeclencheurIds = Array.from(checkboxesJalons).map(cb => parseInt(cb.value));
    if(id){
      const currentTaskId = parseInt(id);
      for(const jalonId of jalonDeclencheurIds){
        if(isDescendantUnifie('T:'+currentTaskId, 'J:'+jalonId)){
          alert("❌ Cycle détecté : ce livrable déclencheur créerait une boucle. Sélection annulée.");
          return;
        }
      }
    }
    const jalonDeclencheur = ['L', ...jalonDeclencheurIds];

    const values={
      Equipe: equipeId,
      Projet: projet_id,
      Tache: nom,
      Date_debut: Math.floor(new Date(debut).getTime()/1000),
      Date_fin: Math.floor(new Date(fin).getTime()/1000),
      Duree_jours: duree,
      Statut: statutId,
      Porteur: porteurId,
      Commentaires: comments,
      Predecesseurs: predecessorTasks,
      Jalon_declencheur: jalonDeclencheur
    };

    if(id){
      await grist.docApi.applyUserActions([["UpdateRecord","Taches",parseInt(id),values]]);
    }else{
      await grist.docApi.applyUserActions([["AddRecord","Taches",null,values]]);
    }
    closeModal("modal-tache");
    await init();
    await calculatePERT();
    construire();
  }catch(e){ alert("Erreur: "+e.message); console.error(e); }
}

async function deleteTache(){
  const id=parseInt(document.getElementById("field-tache-id").value);
  if(!id) return;
  if(!confirm("Supprimer cette tâche ?")) return;
  try{
    await grist.docApi.applyUserActions([["RemoveRecord","Taches",id]]);
    closeModal("modal-tache");
    await init();
    await calculatePERT();
    construire();
  }catch(e){ alert("Erreur: "+e.message); console.error(e); }
}

/* ---------- Construction du Kanban matriciel ---------- */

function construire(){
  filtreProjet = document.getElementById("filtre-projet").value;

  // ✅ FIX: "Non attribué" est maintenant un vrai porteur dans DB.porteurs
  // On le place en dernier dans la liste pour l'affichage
  const lignes = [...DB.porteurs].sort((a,b)=>{
    const aNA = norm(a.Nom)===norm("Non attribué");
    const bNA = norm(b.Nom)===norm("Non attribué");
    if(aNA && !bNA) return 1;
    if(!aNA && bNA) return -1;
    return 0;
  });

  const matrix = document.getElementById("matrix");
  matrix.innerHTML = "";
  matrix.style.setProperty("--n-cols", STATUTS.length);

  // Coin haut-gauche
  matrix.appendChild(el("div", "corner", "Porteur"));

  // En-têtes de colonnes (statuts)
  STATUTS.forEach(s=>{
    const header = el("div", "col-header");
    header.style.borderTop = `3px solid ${cssVarValue(s.couleur)}`;
    const nomEl = el("span", "nom", s.nom);
    header.appendChild(nomEl);
    matrix.appendChild(header);
  });

  let tachesVisibles = 0;

  lignes.forEach(porteur=>{
    const isNonAssigne = norm(porteur.Nom) === norm("Non attribué");

    // Tâches de cette ligne, filtrées par projet si besoin
    // ✅ FIX: Comparaison directe par ID réel (plus de cas null à gérer)
    const tachesLigne = DB.taches.filter(t=>{
      const rid = refId(t.Porteur);
      const matchPorteur = (rid === porteur.id) || (isNonAssigne && (rid===null || rid===undefined || rid===""));
      const matchProjet = !filtreProjet || refId(t.Projet)===parseInt(filtreProjet);
      return matchPorteur && matchProjet;
    });

    // Label de ligne
    const label = el("div", "row-label"+(isNonAssigne?" non-assigne":""));
    label.appendChild(el("span", "nom", porteur.Nom));
    label.appendChild(el("span", "count", `${tachesLigne.length} tâche${tachesLigne.length>1?"s":""}`));
    matrix.appendChild(label);

    // Une cellule par statut
    STATUTS.forEach(s=>{
      const cell = el("div", "cell");
      cell.dataset.statut = s.nom;
      cell.dataset.porteurId = porteur.id;

      const tachesCell = tachesLigne.filter(t=>{
        const statutTexte = resolveRef(DB.parametres, t.Statut, "Statut");
        return norm(statutInfo(statutTexte).nom) === norm(s.nom);
      });

      tachesCell.forEach(t=>{
        tachesVisibles++;
        const proj = DB.projets.find(c=>c.id===refId(t.Projet));
        const card = el("div", "card "+s.cls);
        card.draggable = true;

        const titre = el("div", "titre", t.Tache);
        card.appendChild(titre);

        if(proj) card.appendChild(el("span", "badge-proj", proj.Projet));

        // ✅ Dépendances : bloqué par (rouge) puis dépend de (jaune)
        const preds = getPredecessorTasks(t);
        const blocked = getPredecessorsBlocked(t);
        const jalonsDecl = getTacheJalonsDeclencheurs(t);
        const jalonsNonAtteints = jalonsDecl.filter(j => !getJalonAtteint(j));
        const statutTache = resolveRef(DB.parametres, t.Statut, "Statut");
        const jalonsConditionnesNonAtteints = norm(statutTache) !== norm("Terminé")
          ? getJalonsConditionnesParTache(t).filter(j => !getJalonAtteint(j))
          : [];

        if(blocked.length > 0){
          const noms = blocked.map(p => p.Tache || p).join(", ");
          const ligne = el("div", "dep-line");
          ligne.appendChild(el("span","puce","🔴"));
          ligne.appendChild(document.createTextNode(`Bloqué par : ${noms}`));
          card.appendChild(ligne);
        }
        if(jalonsNonAtteints.length > 0){
          const noms = jalonsNonAtteints.map(j => j.Nom).join(", ");
          const ligne = el("div", "dep-line");
          ligne.appendChild(el("span","puce","🔶"));
          ligne.appendChild(document.createTextNode(`En attente de : ${noms}`));
          card.appendChild(ligne);
        }
        if(jalonsConditionnesNonAtteints.length > 0){
          const noms = jalonsConditionnesNonAtteints.map(j => j.Nom).join(", ");
          const ligne = el("div", "dep-line");
          ligne.appendChild(el("span","puce","🔶"));
          ligne.appendChild(document.createTextNode(`Conditionne : ${noms}`));
          card.appendChild(ligne);
        }
        if(preds.length > 0){
          const noms = preds.map(p => p.Tache || p).join(", ");
          const ligne = el("div", "dep-line");
          ligne.appendChild(el("span","puce","🟡"));
          ligne.appendChild(document.createTextNode(`Dépend de : ${noms}`));
          card.appendChild(ligne);
        }

        // ✅ Commentaire (avant la date), tronqué à 2 lignes
        if(t.Commentaires){
          card.appendChild(el("div", "commentaire", t.Commentaires));
        }

        const dIdx = dayIndex(t.Date_debut);
        if(dIdx!==null){
          const duree = t.Duree_jours||1;
          const dates = el("div", "dates", `${fmtJJMM(t.Date_debut)} · ${duree} j`);
          card.appendChild(dates);
        }

        card.onclick = () => openTacheEdit(t);

        card.addEventListener("dragstart", (e)=>{
          draggedTaskId = t.id;
          card.classList.add("dragging");
          e.dataTransfer.effectAllowed = "move";
        });
        card.addEventListener("dragend", ()=>{
          card.classList.remove("dragging");
          draggedTaskId = null;
        });

        cell.appendChild(card);
      });

      const btnAdd = el("button", "btn-add-cell", "+ Ajouter");
      btnAdd.onclick = () => openTacheCreate(s.nom, isNonAssigne ? "" : porteur.Nom);
      cell.appendChild(btnAdd);

      cell.addEventListener("dragover", (e)=>{
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        cell.classList.add("drag-over");
      });
      cell.addEventListener("dragleave", ()=>{
        cell.classList.remove("drag-over");
      });
      cell.addEventListener("drop", (e)=>{
        e.preventDefault();
        cell.classList.remove("drag-over");
        if(draggedTaskId===null) return;
        const porteurId = parseInt(cell.dataset.porteurId);
        deplacerTache(draggedTaskId, cell.dataset.statut, porteurId);
      });

      matrix.appendChild(cell);
    });
  });

  document.getElementById("meta").textContent = `${tachesVisibles} tâche(s) affichée(s) · ${DB.porteurs.length} porteur(s)`;
  rendreLegende();
}

function rendreLegende(){
  const l=document.getElementById("legende");
  l.innerHTML="";
  STATUTS.forEach(s=>{
    const item=el("div","item");
    const puce=el("span","puce"); puce.style.background=cssVarValue(s.couleur);
    item.appendChild(puce);
    item.appendChild(document.createTextNode(s.nom));
    l.appendChild(item);
  });
}

function el(tag,cls,txt){
  const e=document.createElement(cls?"div":tag);
  if(cls)e.className=cls;
  if(txt!==undefined&&txt!==null)e.textContent=txt;
  return e;
}

document.getElementById("btn-add-tache").onclick = () => openTacheCreate();
document.getElementById("filtre-projet").addEventListener("change", construire);
document.getElementById("field-tache-debut").addEventListener("change", majDuree);
document.getElementById("field-tache-fin").addEventListener("change", majDuree);
document.getElementById("field-tache-projet").addEventListener("change", (e)=>{
  populatePredecessorsSelect(parseInt(e.target.value)||null, []);
  populateJalonsDeclencheursSelect(parseInt(e.target.value)||null, []);
});
grist.onRecords(()=>init());
init();
</script>
